<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capacitance Grid WebBLE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="content-wrapper">
        <h1>ESP32S3 WebBLE</h1>

        <div class="btn-group">
            <button id="connectBleButton" class="connectButton">Connect</button>
            <button id="disconnectBleButton" class="disconnectButton">Disconnect</button>
        </div>

        <div class="status-bar">
            BLE status: <strong><span id="bleState" style="color:#d13a30;">Disconnected</span></strong>
        </div>

        <h2>Received Value</h2>
        
        <div class="card-grid">
            <div class="card">
                <p class="gray-label">Label</p>
                <p class="reading"><span id="valueContainer1">-</span></p>
            </div>
            <div class="card">
                <p class="gray-label">Confidence</p>
                <p class="reading"><span id="valueContainer2">-</span></p>
            </div>
            <div class="card">
                <p class="gray-label">Inference</p>
                <p class="reading"><span id="valueContainer3">-</span></p>
            </div>
            <div class="card">
                <p class="gray-label">Count</p>
                <p class="reading"><span id="valueContainer4">-</span></p>
            </div>
        </div>

        <div class="footer-timestamp">
            <i>Last update:</i> <span id="timestamp">N/A</span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
