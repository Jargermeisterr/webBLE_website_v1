
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitance Grid WebBLE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>ESP32S3 WebBLE Application</h1>

    <button id="connectBleButton" class="connectButton">Connect to ESP32S3</button>
    <button id="disconnectBleButton" class="disconnectButton">Disconnect ESP32S3</button>

    <p>BLE status: <strong><span id="bleState" style="color:#d13a30;">Disconnected</span></strong></p>

    <h2>Received Value</h2>
    
    <p>Label: <span id="valueContainer1">NaN</span></p>
    <p>Confidence: <span id="valueContainer2">NaN</span></p>
    <p>Inference Time: <span id="valueContainer3">NaN</span></p>
    <p>Count: <span id="valueContainer4">NaN</span></p>

    <p><i>Last reading time:</i> <span id="timestamp"></span></p>

    <script src="main.js"></script>
    
</body>
</html>
