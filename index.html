<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitance Grid WebBLE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="content-wrapper">
        <h1>ESP32S3 WebBLE Application</h1>

        <button id="connectBleButton" class="connectButton">Connect to ESP32S3</button>
        <button id="disconnectBleButton" class="disconnectButton">Disconnect ESP32S3</button>

        <p>BLE status: <strong><span id="bleState" style="color:#d13a30;">Disconnected</span></strong></p>

        <h2>Received Value</h2>
        
        <div class="card-grid">
            <div class="card">
                <p class="gray-label">Label:</p>
                <p class="reading"><span id="valueContainer1">NaN</span></p>
            </div>
            <div class="card">
                <p class="gray-label">Confidence:</p>
                <p class="reading"><span id="valueContainer2">NaN</span></p>
            </div>
            <div class="card">
                <p class="gray-label">Inference Time:</p>
                <p class="reading"><span id="valueContainer3">NaN</span></p>
            </div>
            <div class="card">
                <p class="gray-label">Count:</p>
                <p class="reading"><span id="valueContainer4">NaN</span></p>
            </div>
        </div>

        <p><i>Last reading time:</i> <span id="timestamp"></span></p>
    </div>

    <script src="main.js"></script>
    
</body>
</html>
